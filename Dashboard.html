<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image-Rich Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      display: flex;
      height: 750px;
      background-image: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1950&q=80') 
      no-repeat center center / cover;
      color: #0e0c0c;
    }

    .sidebar {
      width: 250px;
      background: rgba(216, 197, 197, 0.85);
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .sidebar h2 {
      color: #00e5ff;
      margin-bottom: -250px;
      text-align: center;
    }

    .nav-links {
      list-style: none;
    }

    .nav-links li {
      margin: 20px 0;
      display: flex;
      align-items: center;
    }

    .nav-links img {
      width: 20px;
      height: 20px;
      margin-right: 10px;
    }

    .nav-links a {
      text-decoration: none;
      color: #f7f3f3;
      font-size: 18px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #00e5ff;
    }

    .main-content {
      flex: 1;
      padding: 40px;
      backdrop-filter: blur(10px);
      overflow-y: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 36px;
    }

    .profile-img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid #00e5ff;
      object-fit: cover;
    }

    .cards {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .card {
      background: rgba(239, 193, 193, 0.4);
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
    }
    .card-content {
      position: relative;
      z-index: 2;
      padding: 20px;
    }

    .card h3 {
      font-size: 22px;
      margin-bottom: 10px;
      color: #00e5ff;
    }

    .card p {
      font-size: 16px;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      body {
        flex-direction: column;
      }

      .main-content {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Dashboard</h2>
    <ul class="nav-links">
      <li><img src="https://img.icons8.com/ios-filled/50/ffffff/user.png"/><a href="profile.html">Profile</a></li>
      <li><img src="https://img.icons8.com/ios-filled/50/ffffff/home.png"/><a href="home.html">Home</a></li>
      <li><img src="https://img.icons8.com/ios-filled/50/ffffff/open-box.png"/><a href="product.html">Product</a></li>
      <li><img src="https://img.icons8.com/ios-filled/50/ffffff/shopping-cart.png"/><a href="Cart.html">Cart</a></li>
      <li><img src="https://img.icons8.com/ios-filled/50/ffffff/logout-rounded-up.png"/><a href="#">Logout</a></li>
    </ul>
    <p style="text-align:center; font-size: 14px; color: #aaa;">© 2025 Dashboard Inc.</p>
  </div>

  <div class="main-content">
    <div class="header">
      <h1>Welcome To BestCure!</h1>
      <img src="https://randomuser.me/api/portraits/women/65.jpg" alt="Profile Image" class="profile-img"/>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-content">
          <h3>Daily Visits</h3>
          <p>0</p>
        </div>
      </div>
      <div class="card">
        <div class="card-content">
          <h3>Revenue</h3>
          <p>$ 0</p>
        </div>
      </div>
      <div class="card">
        <div class="card-content">
          <h3>Tasks Completed</h3>
          <p>0</p>
        </div>
      </div>
      <div class="card">
        <div class="card-content">
          <h3>Notifications</h3>
          <p>0</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
